services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      API_KEY: local-smoke-key
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CAS_DRIVER: mock
      CAS_COOLDOWN_MINUTES: 10
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_KEY: local-smoke-key
    ports:
      - "5173:5173"
