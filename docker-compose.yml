services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    env_file:
      - ./apps/api/.env
    command: >
      sh -lc 'export
      VITE_API_KEY="$${VITE_API_KEY:-$${API_KEY}}"
      VITE_API_BASE_URL="$${VITE_API_BASE_URL:-}"
      VITE_API_PROXY_TARGET="$${VITE_API_PROXY_TARGET:-http://api:8000}"
      VITE_ALLOWED_HOSTS="$${VITE_ALLOWED_HOSTS:-node56.webte.fei.stuba.sk}"
      CHOKIDAR_USEPOLLING="$${CHOKIDAR_USEPOLLING:-true}";
      npm run dev -- --host 0.0.0.0 --port 5173'
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app            # mount your frontend source into the container
      - /app/node_modules          # keep node_modules inside container
