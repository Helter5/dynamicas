<!doctype html>
<html><head><meta charset="utf-8">
<title>Motion — Easing & Timing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; font-family: var(--sk-font-text); color: #1D1D1F; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .item { background: #F5F5F7; border-radius: 10px; padding: 12px; min-width: 130px; }
  .dot { width: 12px; height: 12px; background: #0071E3; border-radius: 50%; margin: 6px 0; animation: slide 1.6s var(--ease-apple) infinite alternate; }
  .item.fast .dot { animation-duration: 0.32s; }
  .item.med .dot { animation-duration: 0.6s; }
  .item.slow .dot { animation-duration: 1.0s; }
  @keyframes slide { from { transform: translateX(0); } to { transform: translateX(86px); } }
  .name { font-size: 11px; font-weight: 600; }
  .val { font-size: 10px; color: #6E6E73; font-family: ui-monospace, monospace; }
</style>
</head><body>
  <div class="row">
    <div class="item fast">
      <div class="name">Canonical · 0.32s</div>
      <div class="dot"></div>
      <div class="val">cubic-bezier(.4,0,.6,1)</div>
    </div>
    <div class="item med">
      <div class="name">Panel · 0.40s</div>
      <div class="dot"></div>
      <div class="val">cubic-bezier(.4,0,.6,1)</div>
    </div>
    <div class="item slow">
      <div class="name">Reveal · 0.50s</div>
      <div class="dot"></div>
      <div class="val">cubic-bezier(.4,0,.6,1)</div>
    </div>
  </div>
</body></html>
