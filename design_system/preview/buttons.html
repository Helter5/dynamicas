<!doctype html>
<html><head><meta charset="utf-8">
<title>Buttons — Primary & Secondary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .pair { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .lbl { font-family: var(--sk-font-text); font-size: 10px; color: #6E6E73; }
  .dark-bg { background: #1D1D1F; padding: 8px; border-radius: 8px; display: inline-block; }
</style>
</head><body>
  <div class="row">
    <div class="pair">
      <button class="sk-btn-buy">Buy</button>
      <div class="lbl">Buy pill · #0071E3</div>
    </div>
    <div class="pair">
      <div class="dark-bg"><button class="sk-btn-explore">Explore iPhone</button></div>
      <div class="lbl">Explore pill · rgba(18,18,18,.80)</div>
    </div>
    <div class="pair">
      <button class="sk-btn-marquee">Order now</button>
      <div class="lbl">Marquee CTA · 980px pill</div>
    </div>
    <div class="pair">
      <a class="sk-link-icon" href="#">Watch the film ›</a>
      <div class="lbl">Icon link · #2997FF</div>
    </div>
  </div>
</body></html>
