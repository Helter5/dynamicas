<!doctype html>
<html><head><meta charset="utf-8">
<title>Color — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .swatch { border-radius: 8px; padding: 12px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-inset-swatch); }
  .hex { font-family: var(--sk-font-text); font-size: 12px; font-weight: 600; }
  .label { font-family: var(--sk-font-text); font-size: 10px; opacity: 0.65; }
  .light { color: #fff; }
</style>
</head><body>
  <div class="grid">
    <div class="swatch" style="background:#FFFFFF;box-shadow:inset 0 0 0 1px #E8E8ED"><div class="label">fill</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch" style="background:#FAFAFC"><div class="label">fill-secondary</div><div class="hex">#FAFAFC</div></div>
    <div class="swatch" style="background:#F5F5F7"><div class="label">fill-tertiary · most-used</div><div class="hex">#F5F5F7</div></div>
    <div class="swatch light" style="background:#333336"><div class="label">dark card</div><div class="hex">#333336</div></div>
    <div class="swatch light" style="background:#161617"><div class="label">darkest</div><div class="hex">#161617</div></div>
    <div class="swatch light" style="background:#121214"><div class="label">compare-dark</div><div class="hex">#121214</div></div>
  </div>
</body></html>
