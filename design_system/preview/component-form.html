<!doctype html>
<html><head><meta charset="utf-8">
<title>Form — Dropdown</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; font-family: var(--sk-font-text); color: #1D1D1F; }
  .field { display: flex; flex-direction: column; gap: 6px; max-width: 280px; }
  label { font-size: 12px; color: #6E6E73; }
  select {
    appearance: none; background: #fff; color: #1D1D1F;
    font-family: var(--sk-font-text); font-size: 14px;
    padding: 10px 14px; padding-right: 36px;
    border-radius: 8px; border: none;
    box-shadow: 0 0 0 1px rgba(180,180,180,0.3);
    background-image: url('../assets/chevron-down.svg');
    background-repeat: no-repeat; background-position: right 12px center;
    background-size: 12px;
  }
  select:focus { outline: 2px solid #0071E3; outline-offset: 1px; }
</style>
</head><body>
  <div class="field">
    <label>Choose a finish</label>
    <select>
      <option>Desert Titanium</option>
      <option>Black Titanium</option>
      <option>Natural Titanium</option>
    </select>
  </div>
</body></html>
