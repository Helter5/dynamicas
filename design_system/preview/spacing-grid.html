<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing — 4px Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; color: #1D1D1F; font-family: var(--sk-font-text); }
  .scale { display: flex; align-items: flex-end; gap: 6px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: #0071E3; border-radius: 2px; }
  .lbl { font-size: 10px; color: #6E6E73; }
</style>
</head><body>
  <div class="scale">
    <div class="step"><div class="bar" style="width:14px;height:4px"></div><div class="lbl">4</div></div>
    <div class="step"><div class="bar" style="width:14px;height:8px"></div><div class="lbl">8</div></div>
    <div class="step"><div class="bar" style="width:14px;height:12px"></div><div class="lbl">12</div></div>
    <div class="step"><div class="bar" style="width:14px;height:16px"></div><div class="lbl">16</div></div>
    <div class="step"><div class="bar" style="width:14px;height:20px"></div><div class="lbl">20</div></div>
    <div class="step"><div class="bar" style="width:14px;height:24px"></div><div class="lbl">24</div></div>
    <div class="step"><div class="bar" style="width:14px;height:28px"></div><div class="lbl">28</div></div>
    <div class="step"><div class="bar" style="width:14px;height:32px"></div><div class="lbl">32</div></div>
    <div class="step"><div class="bar" style="width:14px;height:40px"></div><div class="lbl">40</div></div>
    <div class="step"><div class="bar" style="width:14px;height:44px"></div><div class="lbl">44</div></div>
    <div class="step"><div class="bar" style="width:14px;height:76px"></div><div class="lbl">76</div></div>
  </div>
</body></html>
