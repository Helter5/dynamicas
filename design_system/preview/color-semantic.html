<!doctype html>
<html><head><meta charset="utf-8">
<title>Color — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .swatch { border-radius: 8px; padding: 10px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; box-shadow: var(--shadow-inset-swatch); }
  .hex { font-family: var(--sk-font-text); font-size: 12px; font-weight: 600; }
  .label { font-family: var(--sk-font-text); font-size: 10px; opacity: 0.85; }
</style>
</head><body>
  <div class="grid">
    <div class="swatch" style="background:#FF791B"><div class="label">"New" badge</div><div class="hex">#FF791B</div></div>
    <div class="swatch" style="background:#00D959"><div class="label">Environment</div><div class="hex">#00D959</div></div>
    <div class="swatch" style="background:#8664FF"><div class="label">Recycling</div><div class="hex">#8664FF</div></div>
    <div class="swatch" style="background:#ED6300"><div class="label">Electricity</div><div class="hex">#ED6300</div></div>
    <div class="swatch" style="background:#00A1B3"><div class="label">Packaging</div><div class="hex">#00A1B3</div></div>
  </div>
</body></html>
