<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing — Section Rhythm</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 14px; color: #1D1D1F; font-family: var(--sk-font-text); }
  .demo { display: flex; flex-direction: column; }
  .section { background: #F5F5F7; padding: 16px; border-radius: 8px; font-size: 12px; color: #6E6E73; text-align: center; }
  .gap { background: repeating-linear-gradient(45deg, #fafafc, #fafafc 4px, #fff 4px, #fff 8px); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #86868B; }
  .lbl { font-size: 11px; color: #1D1D1F; font-weight: 600; }
</style>
</head><body>
  <div class="demo">
    <div class="section">Section · 76px internal padding</div>
    <div class="gap" style="height:42px">160px · global-section-padding</div>
    <div class="section">Section · 76px internal padding</div>
  </div>
  <p class="sk-caption" style="margin:10px 0 0">Major sections separated by <strong>160px</strong>; internal stacking uses <strong>76px</strong>.</p>
</body></html>
