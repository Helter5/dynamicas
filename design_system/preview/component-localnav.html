<!doctype html>
<html><head><meta charset="utf-8">
<title>Local Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #F5F5F7; padding: 20px; margin: 0; }
  .localnav {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-radius: 8px;
    padding: 0 22px; height: 52px;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08);
  }
  .title { font-family: var(--sk-font-display); font-size: 21px; font-weight: 600; letter-spacing: 0.231px; color: #1D1D1F; }
  .right { display: flex; align-items: center; gap: 16px; }
  .nav-link { font-family: var(--sk-font-text); font-size: 12px; color: #1D1D1F; text-decoration: none; }
</style>
</head><body>
  <nav class="localnav">
    <span class="title">iPhone 17 Pro</span>
    <div class="right">
      <a class="nav-link" href="#">Overview</a>
      <a class="nav-link" href="#">Switch from Android</a>
      <a class="nav-link" href="#">Tech Specs</a>
      <button class="sk-btn-buy">Buy</button>
    </div>
  </nav>
</body></html>
