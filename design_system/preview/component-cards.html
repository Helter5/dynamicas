<!doctype html>
<html><head><meta charset="utf-8">
<title>Cards — Flat Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #FAFAFC; padding: 14px; font-family: var(--sk-font-text); color: #1D1D1F; }
  .row { display: flex; gap: 12px; }
  .card { flex: 1; padding: 18px; border-radius: 20px; min-height: 100px; display: flex; flex-direction: column; justify-content: space-between; }
  .light-card { background: #F5F5F7; }
  .dark-card { background: #1D1D1F; color: #fff; }
  .pass-card { background: #fff; border-radius: 28px; padding: 18px; }
  .eyebrow { font-size: 11px; color: #6E6E73; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
  .dark-card .eyebrow { color: rgba(255,255,255,0.6); }
  .head { font-family: var(--sk-font-display); font-size: 18px; font-weight: 600; line-height: 1.2; }
</style>
</head><body>
  <div class="row">
    <div class="card light-card">
      <div class="eyebrow">A19 Pro</div>
      <div class="head">The fastest chip ever in iPhone.</div>
    </div>
    <div class="card dark-card">
      <div class="eyebrow">Camera</div>
      <div class="head">48MP Fusion. New 5× telephoto.</div>
    </div>
    <div class="pass-card">
      <div class="eyebrow">All Access Pass</div>
      <div class="head">From $33.29/mo.</div>
    </div>
  </div>
</body></html>
