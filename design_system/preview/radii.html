<!doctype html>
<html><head><meta charset="utf-8">
<title>Radii — Bimodal</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; color: #1D1D1F; font-family: var(--sk-font-text); }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: #1D1D1F; }
  .lbl { font-size: 10px; color: #6E6E73; }
  h3 { font-size: 11px; color: #86868B; margin: 0 0 8px; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .group + .group { margin-top: 12px; }
</style>
</head><body>
  <div class="group">
    <h3>Pills · ≥120px (tappable)</h3>
    <div class="row">
      <div class="item"><div class="box" style="width:80px;height:28px;border-radius:120px;background:#0071E3"></div><div class="lbl">120</div></div>
      <div class="item"><div class="box" style="width:80px;height:28px;border-radius:170px;background:#0071E3"></div><div class="lbl">170</div></div>
      <div class="item"><div class="box" style="width:120px;height:36px;border-radius:980px;background:#0066CC"></div><div class="lbl">980</div></div>
    </div>
  </div>
  <div class="group">
    <h3>Cards · 8–56px (readable)</h3>
    <div class="row">
      <div class="item"><div class="box" style="width:48px;height:48px;border-radius:8px"></div><div class="lbl">8</div></div>
      <div class="item"><div class="box" style="width:48px;height:48px;border-radius:20px"></div><div class="lbl">20</div></div>
      <div class="item"><div class="box" style="width:48px;height:48px;border-radius:28px"></div><div class="lbl">28</div></div>
      <div class="item"><div class="box" style="width:48px;height:48px;border-radius:32px"></div><div class="lbl">32</div></div>
      <div class="item"><div class="box" style="width:48px;height:48px;border-radius:56px"></div><div class="lbl">56</div></div>
    </div>
  </div>
</body></html>
