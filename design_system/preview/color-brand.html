<!doctype html>
<html><head><meta charset="utf-8">
<title>Color — Brand & Action</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; }
  .swatch { flex: 1; border-radius: 10px; padding: 14px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-inset-swatch); }
  .swatch .hex { font-family: var(--sk-font-text); font-size: 13px; font-weight: 600; letter-spacing: -0.1px; }
  .swatch .label { font-family: var(--sk-font-text); font-size: 11px; opacity: 0.7; }
  .light { color: #fff; }
</style>
</head><body>
  <div class="row">
    <div class="swatch light" style="background:#0071E3"><div class="label">Primary CTA</div><div class="hex">#0071E3</div></div>
    <div class="swatch light" style="background:#0066CC"><div class="label">Body link / hover</div><div class="hex">#0066CC</div></div>
    <div class="swatch light" style="background:#2997FF"><div class="label">Link on dark</div><div class="hex">#2997FF</div></div>
  </div>
</body></html>
