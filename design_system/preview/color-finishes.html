<!doctype html>
<html><head><meta charset="utf-8">
<title>Color — Device Finishes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1D1D1F; padding: 20px; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: center; }
  .finish { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .circle { width: 64px; height: 64px; border-radius: 50%; box-shadow: var(--shadow-inset-swatch), 0 0 0 1px rgba(255,255,255,0.05); }
  .name { font-family: var(--sk-font-text); font-size: 13px; font-weight: 600; }
  .hex { font-family: var(--sk-font-text); font-size: 11px; opacity: 0.7; }
</style>
</head><body>
  <div class="grid">
    <div class="finish"><div class="circle" style="background:radial-gradient(circle at 30% 30%, #fbb37e, #f77e2d 60%, #c95a17)"></div><div class="name">Desert Titanium</div><div class="hex">#F77E2D</div></div>
    <div class="finish"><div class="circle" style="background:radial-gradient(circle at 30% 30%, #5a5f72, #32374a 55%, #1a1d28)"></div><div class="name">Black Titanium</div><div class="hex">#32374A</div></div>
    <div class="finish"><div class="circle" style="background:radial-gradient(circle at 30% 30%, #ffffff, #f5f5f5 60%, #c8c8c8)"></div><div class="name">Natural Titanium</div><div class="hex">#F5F5F5</div></div>
  </div>
</body></html>
