<!doctype html>
<html><head><meta charset="utf-8">
<title>Type — Family & Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; color: #1D1D1F; }
  h3 { font-family: var(--sk-font-text); font-size: 11px; color: #86868B; margin: 0 0 6px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
  .specimen { font-family: var(--sk-font-display); font-size: 36px; line-height: 1.1; }
  .weights { display: flex; gap: 20px; margin-top: 12px; }
  .w { font-family: var(--sk-font-text); }
  .w small { display: block; font-size: 10px; color: #86868B; }
</style>
</head><body>
  <h3>SF Pro Display · 20px+</h3>
  <div class="specimen">Aa Bb Cc 1234567890</div>
  <div class="weights">
    <div class="w" style="font-weight:300; font-size:18px">Light <small>300</small></div>
    <div class="w" style="font-weight:400; font-size:18px">Regular <small>400</small></div>
    <div class="w" style="font-weight:600; font-size:18px">Semibold <small>600</small></div>
    <div class="w" style="font-weight:700; font-size:18px">Bold <small>700</small></div>
  </div>
</body></html>
