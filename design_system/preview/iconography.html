<!doctype html>
<html><head><meta charset="utf-8">
<title>Iconography — Inline SVG Set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; font-family: var(--sk-font-text); color: #1D1D1F; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .icon { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px; background: #F5F5F7; border-radius: 8px; }
  .icon img { width: 18px; height: 18px; }
  .lbl { font-size: 10px; color: #6E6E73; }
</style>
</head><body>
  <div class="grid">
    <div class="icon"><img src="../assets/apple-logo.svg" alt=""><div class="lbl">apple</div></div>
    <div class="icon"><img src="../assets/cart.svg" alt=""><div class="lbl">cart</div></div>
    <div class="icon"><img src="../assets/search.svg" alt=""><div class="lbl">search</div></div>
    <div class="icon"><img src="../assets/chevron-right.svg" alt=""><div class="lbl">chevron</div></div>
    <div class="icon"><img src="../assets/chevron-down.svg" alt=""><div class="lbl">chev-down</div></div>
    <div class="icon"><img src="../assets/play.svg" alt=""><div class="lbl">play</div></div>
    <div class="icon"><img src="../assets/close.svg" alt=""><div class="lbl">close</div></div>
  </div>
  <p class="sk-caption" style="margin-top:10px">All icons are inline SVG using <code>currentColor</code>. No icon font, no emoji, no unicode glyphs.</p>
</body></html>
