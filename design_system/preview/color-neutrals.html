<!doctype html>
<html><head><meta charset="utf-8">
<title>Color — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #fff; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .swatch { border-radius: 8px; padding: 10px; min-height: 92px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-inset-swatch); }
  .hex { font-family: var(--sk-font-text); font-size: 12px; font-weight: 600; }
  .label { font-family: var(--sk-font-text); font-size: 10px; opacity: 0.65; }
  .light { color: #fff; }
</style>
</head><body>
  <div class="grid">
    <div class="swatch light" style="background:#1D1D1F"><div class="label">fill-gray</div><div class="hex">#1D1D1F</div></div>
    <div class="swatch light" style="background:#424245"><div class="label">glyph-2-alt</div><div class="hex">#424245</div></div>
    <div class="swatch light" style="background:#6E6E73"><div class="label">glyph-2</div><div class="hex">#6E6E73</div></div>
    <div class="swatch light" style="background:#86868B"><div class="label">fill-2</div><div class="hex">#86868B</div></div>
    <div class="swatch" style="background:#E8E8ED"><div class="label">fill-4</div><div class="hex">#E8E8ED</div></div>
  </div>
</body></html>
